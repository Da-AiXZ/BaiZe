name: Build Baize IPA

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SCHEME: Baize
  PRODUCT_NAME: Baize
  BUNDLE_ID: com.baize.app

jobs:
  build:
    name: Build & Package IPA (XcodeGen)
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install build tools
        run: |
          brew install ldid xcodegen
          gem install xcpretty

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Configure git to use HTTPS instead of SSH
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Generate Xcode project (XcodeGen)
        run: |
          xcodegen generate
          echo "✅ Baize.xcodeproj generated"

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Baize \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Download Runtime binaries
        run: |
          bash scripts/download-runtime.sh

      - name: Build Archive (xcodebuild)
        run: |
          set -o pipefail
          xcodebuild archive \
            -scheme Baize \
            -sdk iphoneos \
            -arch arm64 \
            -configuration Release \
            -archivePath build/Baize.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.baize.app \
            | tee build.log | xcpretty --color

      - name: Build IPA from Archive
        run: |
          bash scripts/build-ipa.sh build/Baize.xcarchive output

      - name: Verify IPA
        run: |
          bash scripts/verify-ipa.sh output/Baize.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Baize-IPA
          path: output/Baize.ipa
          retention-days: 30

      - name: Generate build report
        if: always()
        run: |
          echo "## Baize Build Report" > build-report.md
          echo "" >> build-report.md
          if [ -f "output/Baize.ipa" ]; then
            echo "- **IPA Size**: $(ls -lh output/Baize.ipa | awk '{print $5}')" >> build-report.md
            echo "- **Build Status**: ✅ Success" >> build-report.md
          else
            echo "- **Build Status**: ❌ Failed" >> build-report.md
            if [ -f "build.log" ]; then
              echo "- **Last 30 lines of build log**:" >> build-report.md
              echo '```' >> build-report.md
              tail -30 build.log >> build-report.md
              echo '```' >> build-report.md
            fi
          fi
          echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M UTC")" >> build-report.md
          echo "- **Target**: iOS 16+ arm64 (iPad Pro M1)" >> build-report.md
          echo "- **TrollStore**: Compatible (ldid fakesigned)" >> build-report.md
          echo "- **Build System**: XcodeGen + xcodebuild" >> build-report.md
          echo "- **Runtime Binaries**: Placeholder (Phase 2B)" >> build-report.md
          cat build-report.md

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
